<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Espionage</title>
    
    <!-- Third-party CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Application CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/character.css') }}">
    
    <!-- Initialize Python variables for JavaScript -->
    <script>
        window.FLASK_CONFIG = {
            staticUrl: "{{ url_for('static', filename='') }}",
            apiBaseUrl: "{{ url_for('api_bp.index') if 'api_bp.index' in url_map else '/api' }}"
        };
    </script>
</head>
<body class="spy-theme">
    {% if background_image %}
    <div class="background-overlay" style="background-image: url('{{ background_image }}')"></div>
    {% endif %}

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Header Section -->
                <div class="text-center mb-4">
                    <h1 class="display-4 text-light mb-2">
                        <i class="fas fa-user-secret me-2"></i>Global Espionage
                    </h1>
                    <p class="lead text-light">Choose a character to begin your espionage adventure</p>
                </div>

                <!-- Error Display - Required by EventHandlers.js -->
                <div class="alert alert-danger" id="characterSelectionError" style="display: none;"></div>

                <!-- Main Form - Required by EventHandlers.js -->
                <form id="storyForm" method="POST" action="{{ url_for('main.generate_story_route') }}">
                    <!-- Character Selection Grid - Required by EventHandlers.js -->
                    <div class="characters-grid">
                        <div class="row g-4">
                            {% for img in images %}
                            <div class="col-md-6">
                                <!-- Character Card - Structure required by EventHandlers.js -->
                                <div class="character-container">
                                    <div class="character-select-card" data-id="{{ img.id }}">
                                        <img class="card-img" src="{{ img.image_url }}" alt="{{ img.name }}">
                                        <div class="selection-indicator">
                                            <i class="fas fa-check"></i>
                                        </div>
                                        <div class="character-info-box">
                                            <div class="character-name">{{ img.name }}</div>
                                            <div class="character-traits-list">
                                                {% if img.character_traits %}
                                                    {% for trait in img.character_traits %}
                                                    <span class="trait-badge">{{ trait }}</span>
                                                    {% endfor %}
                                                {% endif %}
                                            </div>
                                            <div class="character-controls">
                                                <button type="button" class="reroll-btn" data-card-index="{{ loop.index0 }}">
                                                    <i class="fas fa-dice"></i> Reroll
                                                </button>
                                                <button type="button" class="select-character-btn" data-character-id="{{ img.id }}">
                                                    <i class="fas fa-check-circle"></i> Select
                                                </button>
                                                <input type="radio" class="character-checkbox" name="selectedCharacter" value="{{ img.id }}" id="character{{ img.id }}">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <!-- Hidden Input - Required by EventHandlers.js -->
                    <input type="hidden" id="selectedImages" name="selected_images" value="">

                    <!-- Selected Characters Container - Required by EventHandlers.js -->
                    <div class="selected-characters-container mt-4" style="display: none;">
                        <div class="selected-characters-list"></div>
                    </div>

                    <!-- Submit Button - Required by EventHandlers.js -->
                    <div class="text-center mt-4">
                        <button type="submit" id="generateStoryBtn" class="btn btn-primary btn-lg">
                            <i class="fas fa-book-open me-2"></i>Begin Your Story
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container - Required by UIUtils.js -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- Load JavaScript dependencies in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Load application JavaScript last -->
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
