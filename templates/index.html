<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Choose Your Adventure - Prototype</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/agent.css') }}">
</head>
<body class="spy-theme">
    {% if background_image %}
    <div class="background-overlay"></div>
    <img src="{{ background_image }}" class="story-background" alt="Story Background">
    {% endif %}

    <!-- Existing Agent Login -->
    <div class="position-fixed top-0 end-0 p-3">
        <button class="btn btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#agentLoginPanel">
            <i class="fas fa-user-secret me-2"></i>Existing Agent Login
        </button>
        <div class="collapse mt-2" id="agentLoginPanel">
            <div class="card">
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" class="form-control" id="existingAgentName" placeholder="Enter codename">
                        <button class="btn btn-primary" type="button" id="loadAgentBtn">Load</button>
                    </div>
                    <div id="agent-details" class="mt-3" style="display: none;">
                        <button id="continueStoryBtn" class="btn btn-success w-100">
                            Continue Story
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form id="storyForm" method="POST" action="{{ url_for('main.generate_story_route') }}" class="needs-validation" novalidate>
                    <!-- Basic Info -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h3>Agent Details</h3>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="protagonistName" class="form-label">Codename</label>
                                    <input type="text" class="form-control" id="protagonistName" name="protagonist_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="protagonistGender" class="form-label">Gender</label>
                                    <select class="form-select" id="protagonistGender" name="protagonist_gender" required>
                                        <option value="">Choose...</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="non-binary">Non-binary</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Story Selection -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h3>Choose Your Story</h3>
                            <div class="mb-3">
                                <select class="form-select" name="story_type" required>
                                    <option value="">Select a story...</option>
                                    {% for story in story_options.stories %}
                                    <option value="{{ story.id }}">{{ story.title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Character Selection -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h3>Select Character</h3>
                            <div class="row g-4">
                                {% for img in images %}
                                <div class="col-md-6">
                                    <div class="character-card">
                                        <img src="{{ img.image_url }}" class="img-fluid" alt="{{ img.name }}">
                                        <div class="mt-2">
                                            <h4>{{ img.name }}</h4>
                                            <div class="d-flex gap-2">
                                                <button type="button" class="btn btn-outline-primary reroll-btn" data-card-index="{{ loop.index0 }}">
                                                    <i class="fas fa-dice"></i> Reroll
                                                </button>
                                                <button type="button" class="btn btn-outline-success select-character-btn" data-character-id="{{ img.id }}">
                                                    Select
                                                </button>
                                            </div>
                                            <input type="radio" class="d-none" name="selectedCharacter" value="{{ img.id }}" id="character{{ img.id }}" required>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>

                    <!-- Mission Parameters (Optional) -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <button class="btn btn-link" type="button" data-bs-toggle="collapse" data-bs-target="#missionParams">
                                Advanced Options
                            </button>
                        </div>
                        <div class="collapse" id="missionParams">
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Conflict Type</label>
                                        <select class="form-select" name="conflict">
                                            <option value="">Default</option>
                                            {% for emoji, name in story_options.conflicts %}
                                            <option value="{{ name }}">{{ name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Setting</label>
                                        <select class="form-select" name="setting">
                                            <option value="">Default</option>
                                            {% for emoji, name in story_options.settings %}
                                            <option value="{{ name }}">{{ name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Style</label>
                                        <select class="form-select" name="narrative_style">
                                            <option value="">Default</option>
                                            {% for emoji, name in story_options.narrative_styles %}
                                            <option value="{{ name }}">{{ name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Mood</label>
                                        <select class="form-select" name="mood">
                                            <option value="">Default</option>
                                            {% for emoji, name in story_options.moods %}
                                            <option value="{{ name }}">{{ name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="selected_images" value="">

                    <!-- Generate Button -->
                    <div class="text-center mb-5">
                        <button type="submit" class="btn btn-primary btn-lg" id="generateStoryBtn">
                            Generate Story
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner-border text-light" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h3 class="text-light mt-3">Generating Story...</h3>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
