<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="module" src="/static/js/main.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Espionage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/character.css') }}">
</head>
<body>
    {% if background_image %}
    <div class="background-overlay" style="background-image: url('{{ background_image }}')"></div>
    {% endif %}

    <div class="container">
        <!-- Error Display -->
        <div class="alert alert-danger" id="characterSelectionError" style="display: none;"></div>

        <!-- Main Form - Required by EventHandlers.js -->
        <form id="storyForm" method="POST" action="{{ url_for('main.generate_story_route') }}">
            <!-- Character Selection Grid - Structure required by EventHandlers.js -->
            <div class="characters-grid">
                <div class="row">
                    {% for img in images %}
                    <div class="col-md-6">
                        <!-- Character Card Structure - Required by EventHandlers.js -->
                        <div class="character-container">
                            <div class="character-select-card" data-id="{{ img.id }}">
                                <img class="card-img" src="{{ img.image_url }}" alt="{{ img.name }}">
                                <div class="selection-indicator">
                                    <i class="fas fa-check"></i>
                                </div>
                                <div class="character-name">{{ img.name }}</div>
                                <div class="character-traits-list">
                                    {% if img.character_traits %}
                                        {% for trait in img.character_traits %}
                                        <span class="trait-badge">{{ trait }}</span>
                                        {% endfor %}
                                    {% endif %}
                                </div>
                                <div class="character-controls">
                                    <button type="button" class="reroll-btn" data-card-index="{{ loop.index0 }}">
                                        <i class="fas fa-dice"></i> Reroll
                                    </button>
                                    <button type="button" class="select-character-btn" data-character-id="{{ img.id }}">
                                        <i class="fas fa-check-circle"></i> Select
                                    </button>
                                    <input type="radio" class="character-checkbox" name="selectedCharacter" value="{{ img.id }}" id="character{{ img.id }}">
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- Hidden Input - Required by EventHandlers.js -->
            <input type="hidden" id="selectedImages" name="selected_images" value="">

            <!-- Selected Characters Container - Required by EventHandlers.js -->
            <div class="selected-characters-container" style="display: none;">
                <div class="selected-characters-list"></div>
            </div>

            <!-- Submit Button - Required by EventHandlers.js -->
            <div class="text-center">
                <button type="submit" id="generateStoryBtn" class="btn btn-primary">
                    Begin Mission
                </button>
            </div>
        </form>
    </div>

    <!-- Toast Container - Required by UIUtils.js -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="notificationToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
